<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<div class="keyhints">
    <span class="key"><kbd>←→</kbd> move</span>
    <span class="key"><kbd>Z</kbd><kbd>X</kbd> rotate</span>
    <span class="key"><kbd>↑</kbd> flip</span>
    <span class="key"><kbd>↓</kbd> soft drop</span>
    <span class="key"><kbd>SPC</kbd> hard drop</span>
    <span class="key"><kbd>C</kbd> hold</span>
    <span class="key"><kbd>S</kbd> zone</span>
    <span class="key"><kbd>R</kbd> reset</span>
</div>

<span class="version">v0.1.0</span>

<div id="config-overlay" class="hidden" aria-hidden="true">
    <div class="config-panel" role="dialog" aria-label="Game settings">

        <div class="config-header">
            <div>
                <div class="config-title">Settings</div>
                <div class="config-subtitle">Changes apply on next restart</div>
            </div>
            <button class="config-close" id="cfg-close" aria-label="Close settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <div class="config-columns">

            <div>
                <div class="config-section">
                    <div class="config-section-title">Board</div>
                    <div class="config-grid">
                        <div class="config-field">
                            <label for="cfg-boardRows">Rows</label>
                            <input type="number" id="cfg-boardRows" value="20" min="4" max="40">
                        </div>
                        <div class="config-field">
                            <label for="cfg-boardCols">Columns</label>
                            <input type="number" id="cfg-boardCols" value="10" min="4" max="20">
                        </div>
                        <div class="config-field">
                            <label for="cfg-bufferZone">Buffer Zone</label>
                            <input type="number" id="cfg-bufferZone" value="4" min="0" max="10">
                        </div>
                    </div>
                </div>

                <div class="config-section">
                    <div class="config-section-title">Gravity</div>
                    <div class="config-grid">
                        <div class="config-field">
                            <label for="cfg-gravityBase">Base (ms)</label>
                            <input type="number" id="cfg-gravityBase" value="1000" min="50" max="5000" step="50">
                        </div>
                        <div class="config-field">
                            <div class="field-label">Increment</div>
                            <div class="range-row">
                                <input type="range" id="cfg-gravityIncrement" value="0.8" min="0.1" max="2" step="0.05">
                                <span class="range-value" id="lbl-gravityIncrement">0.8</span>
                            </div>
                        </div>
                        <div class="config-field">
                            <label for="cfg-levelCap">Level Cap</label>
                            <input type="number" id="cfg-levelCap" value="99" min="1" max="999">
                        </div>
                    </div>
                </div>

                <div class="config-section">
                    <div class="config-section-title">Goal</div>
                    <div class="config-grid">
                        <div class="config-field">
                            <label for="cfg-goalType">Type</label>
                            <select id="cfg-goalType">
                                <option value="NONE">None</option>
                                <option value="LINES">Lines</option>
                                <option value="TIME">Time</option>
                            </select>
                        </div>
                        <div class="config-field" id="goal-value-row">
                            <label for="cfg-goalValue" id="goal-value-label">Goal Value</label>
                            <input type="number" id="cfg-goalValue" value="0" min="0">
                        </div>
                    </div>
                </div>

                <div class="config-section">
                    <div class="config-section-title">Advanced</div>
                    <div style="margin-top:10px">
                        <label class="toggle-field">
                            <input type="checkbox" id="cfg-collapseOnFreeze" checked>
                            <span>Collapse lines during Freeze</span>
                        </label>
                    </div>
                </div>
            </div>

            <div>
                <div class="config-section">
                    <div class="config-section-title">Handling (ms)</div>
                    <div class="config-grid">
                        <div class="config-field">
                            <label for="cfg-dasDelay">DAS</label>
                            <input type="number" id="cfg-dasDelay" value="133" min="0" max="500" step="1">
                        </div>
                        <div class="config-field">
                            <label for="cfg-arrDelay">ARR</label>
                            <input type="number" id="cfg-arrDelay" value="0" min="0" max="200" step="1">
                        </div>
                        <div class="config-field">
                            <label for="cfg-softDropDelay">Soft Drop</label>
                            <input type="number" id="cfg-softDropDelay" value="0.5" min="0" max="100" step="0.5">
                        </div>
                        <div class="config-field">
                            <label for="cfg-entryDelay">Entry Delay</label>
                            <input type="number" id="cfg-entryDelay" value="200" min="0" max="500" step="10">
                        </div>
                        <div class="config-field">
                            <label for="cfg-lockDelay">Lock Delay</label>
                            <input type="number" id="cfg-lockDelay" value="500" min="100" max="2000" step="10">
                        </div>
                        <div class="config-field">
                            <div class="field-label">Max Lock Resets</div>
                            <div class="range-row">
                                <input type="range" id="cfg-maxLockResets" value="15" min="0" max="30" step="1">
                                <span class="range-value" id="lbl-maxLockResets">15</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="config-section">
                    <div class="config-section-title">Preview</div>
                    <div class="config-grid">
                        <div class="config-field">
                            <div class="field-label">Queue Size</div>
                            <div class="range-row">
                                <input type="range" id="cfg-previewSize" value="5" min="0" max="7" step="1">
                                <span class="range-value" id="lbl-previewSize">5</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="config-section">
                    <div class="config-section-title">Features</div>
                    <div class="config-toggles">
                        <label class="toggle-field">
                            <input type="checkbox" id="cfg-holdEnabled" checked>
                            <span>Hold piece</span>
                        </label>
                        <label class="toggle-field">
                            <input type="checkbox" id="cfg-ghostEnabled" checked>
                            <span>Ghost piece</span>
                        </label>
                        <label class="toggle-field">
                            <input type="checkbox" id="cfg-spinEnabled" checked>
                            <span>Spin detection (T-spin / All-spin)</span>
                        </label>
                        <label class="toggle-field">
                            <input type="checkbox" id="cfg-180Enabled">
                            <span>180° rotation</span>
                        </label>
                    </div>
                </div>
            </div>

        </div>

        <div class="config-footer">
            <button class="btn btn-ghost" id="cfg-reset">Reset defaults</button>
            <button class="btn btn-danger" id="cfg-apply">Apply &amp; Restart</button>
        </div>
    </div>
</div>

<div id="game-wrapper">
    <canvas id="canvas"></canvas>
</div>

<script src="config.js"></script>
<script src="KtrisWebKt.js"></script>
</body>
</html>
